icons_format = " "

[icons]
icons = "awesome6"

[theme.overrides]
separator = ""
critical_bg = "#ff0055"
critical_fg = "#000000"
warning_bg = "#ff0055"
warning_fg = "#000000"
#good_fg = "#ff0055"
#idle_fg = "#ff0055"
#info_fg = "#ff0055"

[[block]]
block = "net"
device = "wg0"
format = " wg0 "
missing_format = ""

[[block]]
block = "net"
device = "br0"
format = " br0({$ip|no ip}) "
inactive_format = " br0(down) "
missing_format = ""

[[block]]
# on toshiro eth0 is the docking station ethernet(?) that's useless to show
if_command = "[ $(hostname) != toshiro ]"
block = "net"
device = "eth0"
format = " eth0({$ip|no ip}) "
inactive_format = " eth0(down) "
missing_format = ""

[[block]]
block = "net"
device = "eth1"
format = " eth1({$ip|no ip}) "
inactive_format = " eth1(down) "
missing_format = ""

[[block]]
block = "net"
device = "eth2"
format = " eth2({$ip|no ip}) "
inactive_format = " eth2(down) "
missing_format = ""

[[block]]
block = "net"
device = "usb0"
format = " usb0({$ip|no ip}) "
inactive_format = " usb0(down) "
missing_format = ""

[[block]]
block = "net"
device = "bnep0"
format = " bnep0({$ip|no ip}) "
inactive_format = " bnep0(down) "
missing_format = ""

[[block]]
block = "net"
device = "wlan0"
format = " wlan0({$ip|no ip}) "
format_alt = " wlan0($ssid;$signal_strength;{$ip|no ip}) "
inactive_format = " wlan0(down) "
missing_format = ""

[[block]]
block = "net"
device = "wlan1"
format = " wlan1({$ip|no ip}) "
format_alt = " wlan1($ssid;$signal_strength;{$ip|no ip}) "
inactive_format = " wlan1(down) "
missing_format = ""

[[block]]
block = "load"
format = " load($1m.eng(width:4)) "

[[block]]
block = "cpu"
format = " cpu($utilization.eng(width:2)) "

[[block]]
block = "memory"
format = " mem($mem_used_percents.eng(width:2)) "

[[block]]
block = "disk_space"
info_type = "used"
warning = 90.0
alert = 95.0
format = " disk($percentage.eng(width:2)) "

[[block]]
if_command = "[ $(hostname) = toshiro ]"
block = "temperature"
chip = "k10temp-pci-00c3"
format = " $average "

[[block]]
if_command = "[ $(hostname) = katsumi ]"
block = "temperature"
chip = "k10temp-pci-00c3"
format = " $average "

[[block]]
block = "sound"
device_kind = "source"
format = " $output_name($volume) | launching pipewire... "
show_volume_when_muted = true
[[block.click]]
button = "left"
cmd = "/home/patrycja/.local/bin/pavuctl -t 4"
[block.mappings]
# toshiro
"alsa_input.pci-0000_07_00.6.*" = "mic"
"alsa_input.usb-RODE_Microphones.*" = "nt1"

[[block]]
block = "sound"
format = " $output_name($volume) | launching pipewire... "
step_width = 5
show_volume_when_muted = true
[[block.click]]
button = "left"
cmd = "/home/patrycja/.local/bin/pavuctl"
[block.mappings]
# toshiro
"alsa_output.pci-0000_07_00.6.analog-stereo" = "speaker"
"alsa_output.pci-0000_07_00.6.HiFi.*" = "speaker"
"alsa_output.pci-0000_01_00.1.hdmi-stereo-.*" = "monitor"
"alsa_output.pci-0000_07_00.1.HiFi.*HDMI.*" = "hdmi"
# katsumi
"alsa_output.pci-0000_0a_00.4.analog-stereo" = "line out"
"alsa_output.pci-0000_00_1f.3.analog-stereo" = "speaker"
"alsa_output.pci-0000_08_00.1.hdmi-stereo" = "hdmi"
"alsa_output.pci-0000_09_00.1.hdmi-stereo" = "hdmi"
# koyuki
"alsa_output._sys_devices_platform_sound_sound_card0.*" = "built-in"
# kurumi
"alsa_output.platform-sound.HiFi__Speaker__sink" = "built-in"
# other
"alsa_output.usb-Plantronics.*" = "headset"
"alsa_output.usb-Apple__Inc.*" = "dongle"
"alsa_output.usb-DisplayLink_Humanscale.*" = "dock"
"alsa_output.usb-RODE_Microphones.*" = "interface"
# bluez
"bluez_output.AC_80_0A.*" = "xm5"

[[block]]
if_command = "[ $(hostname) = toshiro -o $(hostname) = kurumi ]"
block = "backlight"
format = " br($brightness) "

[[block]]
if_command = "[ -d /sys/class/power_supply/BAT0 ]"
block = "battery"
interval = 1
format = " bat($percentage) "
full_format = " bat($percentage) "
empty_format = " bat($percentage) "
charging_format = " bat($percentage) "
missing_format = ""

[[block]]
if_command = "[ -d /sys/class/power_supply/AC ]"
block = "custom"
interval = 1
command = "</sys/class/power_supply/AC/online"
format = " ch($text) "
hide_when_empty = true

[[block]]
if_command = "[ -d /sys/class/power_supply/sbs-6-000b ]"
block = "battery"
interval = 10
device = "sbs-6-000b"
format = " $percentage "
full_format = " $percentage "
missing_format = ""

[[block]]
if_command = "[ -d /sys/class/power_supply/CROS_USBPD_CHARGER0 ]"
block = "custom"
interval = 1
command = "</sys/class/power_supply/CROS_USBPD_CHARGER0/online"
format = " ch($text) "
hide_when_empty = true

[[block]]
if_command = "command -v swaync-client"
block = "notify"
driver = "swaync"
format = " [{$paused{-}|O}] "

[[block]]
block = "time"
interval = 1
format = " $timestamp.datetime(f:'%Y-%m-%d %H:%M:%S') "
